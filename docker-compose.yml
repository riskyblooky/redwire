services:
  postgres:
    image: postgres:15-alpine
    container_name: redwire-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redwire}
      POSTGRES_USER: ${POSTGRES_USER:-redwire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redwire}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redwire-network

  redis:
    image: redis:7-alpine
    container_name: redwire-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redwire-network

  minio:
    image: minio/minio:latest
    container_name: redwire-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - redwire-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: redwire-backend:dev
    container_name: redwire-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-redwire}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-redwire}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_HOURS: 24
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: redwire-evidence
      MINIO_SECURE: "false"
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:-rupaeC7vJHXImS7rk3ICKHqhlTLfiwAnf0BRbKfVsAo=}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-pJiT9KvIAZarxuTHGlmb4kEoXh3XcitCRRR1VOAIJoA=}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,https://localhost:8443}
      SQL_ECHO: "true"
      MCP_SERVER_URL: http://mcp-server:3001
      BACKEND_URL: ${BACKEND_URL:-https://localhost:8443/api}
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost:8443}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # --forwarded-allow-ips: trust X-Forwarded-* / X-Real-IP only from
    # private docker bridge subnets (where nginx lives), not '*' which
    # let any TCP peer claim to be the proxy. GHSA-xg53-8wgq-w9cw.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='172.16.0.0/12'
    networks:
      - redwire-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: redwire-frontend:dev
    container_name: redwire-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: development
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    networks:
      - redwire-network

  nginx:
    image: nginx:1.25-alpine
    container_name: redwire-nginx
    ports:
      - "8080:80"
      - "8443:443"
    command: >
      /bin/sh -c "mkdir -p /etc/letsencrypt/live/localhost && 
      if [ ! -f /etc/letsencrypt/live/localhost/fullchain.pem ]; then 
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 
        -keyout /etc/letsencrypt/live/localhost/privkey.pem 
        -out /etc/letsencrypt/live/localhost/fullchain.pem 
        -subj '/CN=localhost'; 
      fi && 
      envsubst '$$DOMAIN_NAME' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    depends_on:
      - frontend
      - backend
    networks:
      - redwire-network
    restart: always

  certbot:
    image: certbot/certbot
    container_name: redwire-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - redwire-network

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    image: redwire-mcp-server:dev
    container_name: redwire-mcp
    environment:
      REDWIRE_API_URL: http://backend:8000
      MCP_PORT: "3001"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080,https://localhost:8443}
    # GHSA-qf2j-p8q7-v98h follow-up: no host port publishing. The SSE
    # transport is for the in-cluster backend→MCP path; remote clients
    # should route through nginx (which exposes /mcp/* on the public
    # port with the normal Authorization: Bearer <jwt> flow). Bypassing
    # nginx by hitting 127.0.0.1:3001 skipped auth entirely on dev.
    depends_on:
      - backend
    volumes:
      - ./mcp-server:/app
    networks:
      - redwire-network


volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:
  frontend_next_cache:

networks:
  redwire-network:
    driver: bridge
